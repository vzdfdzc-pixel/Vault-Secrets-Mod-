name: Build Mod

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Geode SDK
        uses: geode-sdk/build-geode-mod@main
        with:
          target: android64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VaultCodes.geode
          path: build/*.geode
