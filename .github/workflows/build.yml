name: Build Mod

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        with:
          platform: android64
          sdk: v5.5.3

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VaultCodes.geode
          path: build/*.geode
